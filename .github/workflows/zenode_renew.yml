name: Zenode-Renew

on:
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Zenode-Renew-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 复制脚本到工作目录
        run: cp private/zenode_renew.py zenode_renew.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🛡️ 启动 GOST 代理
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，验证连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org | sed 's/\([0-9]*\.[0-9]*\.\)[0-9]*\.[0-9]*/\1**.**/g'
          echo ""

      - name: 🐍 安装 Python 依赖
        run: pip install requests

      - name: 🚀 执行续期脚本
        env:
          PYTHONIOENCODING: utf-8
          ZENODE_ACCOUNT: ${{ secrets.ZENODE_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
          CRON_JOB: ${{ secrets.CRON_JOB }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: python zenode_renew.py
